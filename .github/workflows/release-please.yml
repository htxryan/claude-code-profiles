name: release-please

# Maintains a perpetual "release PR" against main bundling all unreleased
# conventional-commit changes. When the release PR is merged, release-please
# tags the commit + creates a GitHub release. We then chain `smoke` and
# `publish` jobs gated on the `release_created` output.
#
# Why publish in this workflow instead of a separate workflow on
# `release: published`? Releases created by release-please use the default
# GITHUB_TOKEN. GitHub's anti-loop policy explicitly prevents workflows
# from triggering other workflows when the trigger is a GITHUB_TOKEN-
# authored event. Chaining the publish job inline sidesteps that without
# needing a PAT.
#
# Job graph:
#   release-please ─┐
#                   ├─ (release_created?) ─→ smoke (matrix: ubuntu/macos/windows) ─→ publish
#                   └─ (no release)        ─→ (skip both)
#
# Smoke runs ONLY on the release commit, not on every PR. Its job is to
# gate the npm publish: pack the tarball, install it into a clean
# consumer project on each OS, run `c3p --help`. If smoke fails the
# release tag has been created (release-please does that first) but
# `npm publish` is skipped — bad artifact never reaches the registry.
# Recovering from a failing smoke means deleting the tag + fixing the bug
# + re-cutting the release. Acceptable cost for catching packaging bugs
# (missing `files` entries, broken bin shebang, Windows shim regressions)
# that source-tree CI cannot see.
#
# Auth for `npm publish`: tokenless OIDC trusted publisher. npm allows
# exactly one trusted-publisher entry per package, so this workflow is
# the single, canonical publish path. To configure on npmjs.com:
#   Packages → claude-code-config-profiles → Settings → Trusted publishing
#     Publisher:        GitHub Actions
#     Owner:            htxryan
#     Repository:       claude-code-config-profiles
#     Workflow file:    .github/workflows/release-please.yml
#     Environment:      (blank)
# No NPM_TOKEN secret needed once the trusted publisher entry is saved.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write  # Required for npm provenance via Sigstore OIDC.

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          # Single-package repo. release-please reads .release-please-config.json
          # and .release-please-manifest.json from the repo root.
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  smoke:
    name: smoke ${{ matrix.os }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    # Bash on all three runners — Git for Windows ships bash, so the
    # tarball-glob and tmpdir manipulation below behave identically.
    # Windows runners default to pwsh otherwise.
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node 20
        # Engines minimum. A smoke pass on the lowest supported runtime
        # guarantees the tarball works for any consumer at >= 20.
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Pack tarball
        id: pack
        run: |
          mkdir -p "$RUNNER_TEMP/pack"
          pnpm pack --pack-destination="$RUNNER_TEMP/pack"
          tarball=$(ls "$RUNNER_TEMP/pack"/*.tgz | head -1)
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Install tarball into clean consumer project
        # Use npm rather than pnpm for the consumer install: most users
        # install via npm, and on Windows npm generates `.cmd` / `.ps1`
        # bin shims (a different code path from POSIX shebang dispatch)
        # that we want exercised here.
        run: |
          mkdir -p "$RUNNER_TEMP/consumer"
          cd "$RUNNER_TEMP/consumer"
          npm init -y > /dev/null
          npm install "${{ steps.pack.outputs.tarball }}"

      - name: Run c3p --help from installed tarball
        run: |
          cd "$RUNNER_TEMP/consumer"
          ./node_modules/.bin/c3p --help

  publish:
    needs: [release-please, smoke]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node 24
        # Node 24 LTS ships npm >= 11.5.1, which is the minimum for npm OIDC
        # trusted publishing. Older runtimes need a manual `npm install -g
        # npm@latest`, but that command hits a self-upgrade module-resolution
        # bug on some setup-node tarballs (MODULE_NOT_FOUND promise-retry),
        # so we just use a runtime that already has the right CLI baked in.
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm version (OIDC trusted publishing needs >= 11.5.1)
        run: |
          npm --version
          node --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
