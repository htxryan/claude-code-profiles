name: publish

# Manual / fallback publish workflow. The primary publish path is the
# release-please.yml job, which handles the merge → tag → release → publish
# chain in a single job. This workflow is the manual escape hatch:
#
#   - Re-publishing an existing tag if the release-please run failed mid-way.
#   - Publishing a tag that pre-dates the release-please integration
#     (the very first 0.2.0 release was tagged before publish was chained
#     into release-please.yml).
#
# Trigger via the Actions UI or:
#   gh workflow run publish.yml --ref v0.2.0
#
# Auth: tokenless OIDC trusted publisher. The repo + this workflow file
# path must be registered as a trusted publisher for `claude-code-profiles`
# on npmjs.com (npm UI: package settings → Trusted Publishers; supports
# "pending" rules for packages that don't exist on the registry yet).
#
# The `id-token: write` permission below is required for both auth (npm
# trusted publishers) and provenance signing (Sigstore).

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
