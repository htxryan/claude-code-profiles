name: publish

# Triggers when release-please tags a new release. Builds, tests, and
# publishes to npm with provenance attestation. No NPM_TOKEN secret needed
# when the package is configured for OIDC trusted publishers on npmjs.com.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
