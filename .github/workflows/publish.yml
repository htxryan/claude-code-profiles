name: publish

# Manual / fallback publish workflow. The primary publish path is the
# release-please.yml job, which handles the merge → tag → release → publish
# chain in a single job. This workflow is the manual escape hatch:
#
#   - Re-publishing an existing tag if the release-please run failed mid-way.
#   - Publishing a tag that pre-dates the release-please integration
#     (the very first 0.2.0 release was tagged before publish was chained
#     into release-please.yml).
#
# Trigger via the Actions UI or:
#   gh workflow run publish.yml --ref v0.2.0
#
# Auth: NPM_TOKEN secret (Automation token type — bypasses 2FA per npm's
# CI design). This is a stopgap for the very first publish only: npm's
# Trusted Publishers UI (Packages → Settings → Trusted publishing) only
# becomes available after a package exists on the registry. Once 0.2.0
# is on npm and trusted publishers are configured, this workflow drops
# `NODE_AUTH_TOKEN` and the NPM_TOKEN secret is deleted; auth becomes
# tokenless OIDC. release-please.yml (the primary publish path) is
# already tokenless.
#
# The `id-token: write` permission is required for provenance signing
# (Sigstore) regardless of the auth mechanism.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
