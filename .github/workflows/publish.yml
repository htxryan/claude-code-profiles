name: publish

# Manual / fallback publish workflow. The primary publish path is the
# release-please.yml job, which handles the merge → tag → release → publish
# chain in a single job. This workflow is the manual escape hatch:
#
#   - Re-publishing an existing tag if the release-please run failed mid-way.
#   - Publishing a tag that pre-dates the release-please integration
#     (the very first 0.2.0 release was tagged before publish was chained
#     into release-please.yml).
#
# Trigger via the Actions UI or:
#   gh workflow run publish.yml --ref v0.2.0
#
# Auth: uses an automation NPM_TOKEN secret (required for the first publish
# because OIDC trusted publishers can only be configured after a package
# already exists on the registry). After the initial 0.2.0 publish, switch
# to OIDC by:
#   1. Register this repo + this workflow as a trusted publisher on
#      npmjs.com (Settings -> Trusted Publishers).
#   2. Delete the NPM_TOKEN repo secret.
#   3. Remove the NODE_AUTH_TOKEN env from the publish step below.
# The `id-token: write` permission stays — npm provenance uses Sigstore
# OIDC regardless of whether auth uses a token or trusted publishers.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
