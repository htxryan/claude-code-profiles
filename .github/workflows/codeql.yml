name: CodeQL

# Static analysis for both halves of the repo:
#   - go: the c3p CLI binary at the repo root (security-relevant; pkg
#     traversal, manifest parsing, atomic file ops)
#   - javascript-typescript: the docs site under site/ (Astro SSG)
#
# Findings land in the repo's Security tab, not as inline PR comments.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan on a fixed time picks up advisories added to the
    # CodeQL query packs without waiting for a code change. Sunday 09:17
    # UTC — off-peak, deliberately not on the hour to avoid scheduler
    # contention with every other repo running CodeQL on :00.
    - cron: "17 9 * * 0"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # Required to upload CodeQL SARIF results.
  actions: read

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` adds maintainability/correctness queries
          # on top of the default `security-extended` set. Cheap to run
          # against a small codebase; high signal for catching subtle bugs.
          queries: security-and-quality

      - name: Autobuild
        # JS/TS doesn't need a build step (analyzer reads source directly).
        # Go is autobuildable from go.mod via `go build ./...`.
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
