name: CI

# Run on every push to main and on every PR. The matrix is intentionally wide
# (linux/macos/windows × node 20/22) because cross-platform behavior is
# load-bearing: atomic-rename semantics, lockfile cleanup, signal delivery
# (SIGINT/SIGTERM/SIGHUP), and tmp-path uniqueness all behave differently on
# Windows than on POSIX. Linux-only green would mask real bugs.
#
# CI cancels in-flight runs for the same ref so a force-push doesn't queue up
# duplicate runs (concurrency block below).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: cli ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (src + tests)
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

  site:
    name: site (build + IV offline)
    runs-on: ubuntu-latest
    # Single-OS / single-node: site/ is static SSG output served from CF
    # edge — no per-platform behaviour to test. Keep the matrix narrow so
    # the heavyweight playwright/chromium install only happens once.
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      # Node 22+: Astro 6 requires >=22.12.0 (the engines field on site/
      # package.json reflects this). Match what CF Pages uses in production.
      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache playwright browser binaries (~170MB chromium download).
      # Key includes the playwright version so a bump invalidates the cache
      # automatically. Without this, every CI run re-downloads chromium.
      - name: Resolve playwright version
        id: pw
        run: echo "version=$(node -p "require('./package.json').devDependencies.playwright")" >> "$GITHUB_OUTPUT"

      - name: Cache playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      # `pnpm build` runs `playwright install chromium && astro check &&
      # astro build` (chromium is needed at build time for the rehype-mermaid
      # inline-svg strategy on the extends/includes Concepts pages, R-U-16).
      - name: Build
        run: pnpm build

      # Integration Verification — offline mode skips Lighthouse (network +
      # variance) and the production-URL smoke (we're testing this PR, not
      # whatever's currently on production). Still runs: composition,
      # mermaid render, token contract, theme/dark-mode, hero demo, axe,
      # visual regression vs committed baselines, pagefind index, link
      # integrity. Keeps PR feedback under ~30s after the build.
      - name: IV (offline)
        run: pnpm iv:offline

  smoke:
    name: smoke (npm pack + install)
    runs-on: ubuntu-latest
    # Source-tree tests verify behaviour against the working copy. They do
    # NOT verify that the published artifact actually installs and runs —
    # missing files in the `files` array, broken bin shebang, accidental
    # ESM/CJS regressions, or a build that produces nothing all sail past
    # `pnpm test`. This job packs the tarball with `pnpm pack`, installs it
    # into a clean tmp project via npm (most consumers are on npm, not
    # pnpm), and exercises the bin. `c3p --help` is a deliberately
    # side-effect-free smoke: it loads the dispatch tree, parses argv, and
    # prints help — enough to catch a broken build, no filesystem state to
    # set up.
    #
    # Single OS / single Node: packaging is platform-agnostic JS, and we
    # run on the engines.node minimum (20) so a smoke pass guarantees the
    # tarball works on the lowest supported runtime.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Pack tarball
        id: pack
        run: |
          mkdir -p "$RUNNER_TEMP/pack"
          pnpm pack --pack-destination="$RUNNER_TEMP/pack"
          tarball=$(ls "$RUNNER_TEMP/pack"/*.tgz | head -1)
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Install tarball into clean consumer project
        run: |
          mkdir -p "$RUNNER_TEMP/consumer"
          cd "$RUNNER_TEMP/consumer"
          npm init -y > /dev/null
          npm install "${{ steps.pack.outputs.tarball }}"

      - name: Run c3p --help from installed tarball
        run: |
          cd "$RUNNER_TEMP/consumer"
          ./node_modules/.bin/c3p --help

  audit:
    name: pnpm audit (high+critical)
    runs-on: ubuntu-latest
    # Non-blocking advisory check: surfaces known-vulnerable deps without
    # gating PR merges. A clean pnpm audit run is cheap; flagging is the
    # whole point. continue-on-error keeps the job green even when an
    # advisory lands so the rest of CI is still merge-ready.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # Audit each independent dep tree separately so failures attribute
        # cleanly to the package that owns the vuln. Site has its own
        # lockfile (no workspace) so its tree is fully independent.
        package:
          - { name: "cli (root)", cwd: "." }
          - { name: "site", cwd: "site" }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ${{ matrix.package.cwd }}/pnpm-lock.yaml

      - name: Install dependencies (${{ matrix.package.name }})
        working-directory: ${{ matrix.package.cwd }}
        run: pnpm install --frozen-lockfile

      - name: pnpm audit — ${{ matrix.package.name }} (high + critical only)
        working-directory: ${{ matrix.package.cwd }}
        run: pnpm audit --audit-level=high
