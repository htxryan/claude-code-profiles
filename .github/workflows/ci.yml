name: CI

# Run on every push to main and on every PR. The matrix is intentionally wide
# (linux/macos/windows × node 20/22) because cross-platform behavior is
# load-bearing: atomic-rename semantics, lockfile cleanup, signal delivery
# (SIGINT/SIGTERM/SIGHUP), and tmp-path uniqueness all behave differently on
# Windows than on POSIX. Linux-only green would mask real bugs.
#
# CI cancels in-flight runs for the same ref so a force-push doesn't queue up
# duplicate runs (concurrency block below).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (src + tests)
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test
