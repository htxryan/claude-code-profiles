name: CI

# Run on every push to main and on every PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: cli
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit CLI dependencies
        run: task audit
        continue-on-error: true

      - name: Audit site dependencies
        run: task audit:site
        continue-on-error: true

      - name: Typecheck (src + tests)
        run: task typecheck

      - name: Build
        run: task build

      - name: Test
        run: task test

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  go:
    # F1 (epic claude-code-profiles-248) — Go rewrite lives at go/ during
    # the rewrite. This job runs the Go suite and the helper-parity audit
    # (PR4) on every PR. Post-cutover (epic Z) the working-directory
    # prefix goes away and this job folds back into build-test.
    name: go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: go/go.sum

      - name: Vet
        run: task go:vet

      - name: Build
        run: task go:build

      - name: Test
        run: task go:test

      - name: Helper-parity audit (PR4)
        run: task go:audit

  site:
    name: site (build + IV offline)
    runs-on: ubuntu-latest
    # Single-OS / single-node: site/ is static SSG output served from CF
    # edge — no per-platform behaviour to test. Keep the matrix narrow so
    # the heavyweight playwright/chromium install only happens once.
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      # Node 22+: Astro 6 requires >=22.12.0 (the engines field on site/
      # package.json reflects this). Match what CF Pages uses in production.
      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache playwright browser binaries (~170MB chromium download).
      # Key includes the playwright version so a bump invalidates the cache
      # automatically. Without this, every CI run re-downloads chromium.
      - name: Resolve playwright version
        id: pw
        run: echo "version=$(node -p "require('./package.json').devDependencies.playwright")" >> "$GITHUB_OUTPUT"

      - name: Cache playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      # `pnpm build` runs `playwright install chromium && astro check &&
      # astro build` (chromium is needed at build time for the rehype-mermaid
      # inline-svg strategy on the extends/includes Concepts pages, R-U-16).
      - name: Build
        run: task build:site

      # Integration Verification — offline mode skips Lighthouse (network +
      # variance) and the production-URL smoke (we're testing this PR, not
      # whatever's currently on production). Still runs: composition,
      # mermaid render, token contract, theme/dark-mode, hero demo, axe,
      # visual regression vs committed baselines, pagefind index, link
      # integrity. Keeps PR feedback under ~30s after the build.
      - name: IV (offline)
        run: task test:site
