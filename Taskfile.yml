version: "3"

set: [pipefail]

tasks:
  default:
    desc: List available tasks
    silent: true
    cmd: task --list

  install:
    desc: Install CLI dependencies
    cmd: pnpm install

  install:site:
    desc: Install site dependencies
    dir: site
    cmd: pnpm install

  # ── build ──────────────────────────────────────────────────────────────────

  build:
    desc: Build the CLI
    cmd: pnpm run build

  build:site:
    desc: Build the docs site (installs playwright, runs astro check + build)
    dir: site
    cmd: pnpm build

  # ── typecheck ──────────────────────────────────────────────────────────────

  typecheck:
    desc: Type-check CLI source and tests
    cmd: pnpm run typecheck

  # ── test ───────────────────────────────────────────────────────────────────

  test:
    desc: Run CLI unit tests
    cmd: pnpm test

  test:site:
    desc: Run site integration verification (offline mode)
    dir: site
    cmd: pnpm iv:offline

  # ── audit ──────────────────────────────────────────────────────────────────

  audit:
    desc: Dependency security audit (CLI)
    cmd: pnpm audit --audit-level=high

  audit:site:
    desc: Dependency security audit (site)
    dir: site
    cmd: pnpm audit --audit-level=high

  # ── go (rewrite under go/) ────────────────────────────────────────────────
  # During the rewrite, Go lives at go/. Post-cutover (epic Z) it moves to
  # the repo root and these tasks lose the dir: prefix. CGO_ENABLED=0 is the
  # PR20 default — release builds do not introduce a CGO dependency.

  go:tidy:
    desc: Resolve Go module dependencies
    dir: go
    cmd: go mod tidy

  go:vet:
    desc: Static-analyse Go packages
    dir: go
    cmd: go vet ./...

  go:build:
    desc: Build the Go CLI binary (CGO_ENABLED=0)
    dir: go
    env:
      CGO_ENABLED: "0"
    cmd: go build ./...

  go:test:
    desc: Run Go unit + integration suite
    dir: go
    env:
      CGO_ENABLED: "0"
    cmd: go test ./...

  go:audit:
    desc: Helper-parity audit (PR4) — diff TS vs Go test harness public surfaces
    cmd: bash scripts/helper_parity_audit.sh

  go:lint-jsonout:
    desc: D7 PR3 gate — forbids json.Marshal outside internal/cli/jsonout/
    dir: go
    cmd: bash scripts/jsonout_lint.sh

  # ── release (W2) ───────────────────────────────────────────────────────────
  # Local pre-flight hooks for the W2 release pipeline. The actual release
  # runs in .github/workflows/release.yml on a v[1-9]*.*.* tag push; these
  # tasks are the PR8 fitness-function "dry-run on tag candidate before push".

  release:check:
    desc: W2 — validate .goreleaser.yaml without building
    cmd: goreleaser check

  release:dry-run:
    desc: W2 — local snapshot build (no publish/sign) — pre-tag pre-flight
    cmd: goreleaser release --snapshot --clean --skip=publish,sign,announce

  # ── ci ─────────────────────────────────────────────────────────────────────

  ci:
    desc: Run full CI suite locally (mirrors GitHub Actions)
    cmds:
      - task: typecheck
      - task: build
      - task: test
      - task: audit
      - task: audit:site
      - task: go:vet
      - task: go:build
      - task: go:test
      - task: go:audit
      - task: go:lint-jsonout
